<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 300"
     style="font-family: sans-serif; background: white;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text font-size="13" font-weight="600" x="340" y="20" text-anchor="middle" fill="#222">How high_water advances</text>

<!-- 5 steps laid out horizontally, each ~120px wide -->
<!-- Step labels -->
<text font-size="11" font-weight="600" x="60"  y="42" text-anchor="middle" fill="#185fa5">after poly</text>
<text font-size="11" font-weight="600" x="188" y="42" text-anchor="middle" fill="#c0392b">after epi_ct</text>
<text font-size="11" font-weight="600" x="316" y="42" text-anchor="middle" fill="#c0392b">after gate_ct</text>
<text font-size="11" font-weight="600" x="444" y="42" text-anchor="middle" fill="#1d9e75">after m0</text>
<text font-size="11" font-weight="600" x="572" y="42" text-anchor="middle" fill="#1d9e75">after v0</text>

<!-- Transition arrows -->
<line x1="102" y1="155" x2="136" y2="155" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="230" y1="155" x2="264" y2="155" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="358" y1="155" x2="392" y2="155" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="486" y1="155" x2="520" y2="155" stroke="#888" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- ── Step 1: after poly ── high_water = 22nm -->
<!-- base -->
<rect x="16" y="192" width="88" height="36" rx="3" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
<text font-size="11" x="60" y="214" text-anchor="middle" fill="#633806">poly 0→22</text>
<!-- high water line -->
<line x1="16" y1="192" x2="104" y2="192" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="4 2"/>
<text font-size="10" x="8" y="195" text-anchor="end" fill="#c0392b">hw=22</text>

<!-- ── Step 2: after epi_contact ── explicit z=22, high_water = 59nm -->
<rect x="144" y="192" width="88" height="36" rx="3" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
<text font-size="11" x="188" y="214" text-anchor="middle" fill="#633806">poly 0→22</text>
<!-- epi_contact explicit, same base z=22 -->
<rect x="144" y="136" width="40" height="56" rx="3" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text font-size="10" x="164" y="162" text-anchor="middle" fill="#4a1b0c">epi</text>
<text font-size="10" x="164" y="175" text-anchor="middle" fill="#993c1d">22→59</text>
<!-- high water line at 59 -->
<line x1="144" y1="136" x2="232" y2="136" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="4 2"/>
<text font-size="10" x="140" y="140" text-anchor="end" fill="#c0392b">hw=59</text>
<!-- explicit anchor indicator -->
<text font-size="9" x="188" y="128" text-anchor="middle" fill="#c0392b">explicit z_start=22</text>

<!-- ── Step 3: after gate_contact ── same z=22, high_water stays 59 -->
<rect x="272" y="192" width="88" height="36" rx="3" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
<text font-size="11" x="316" y="214" text-anchor="middle" fill="#633806">poly 0→22</text>
<rect x="272" y="136" width="40" height="56" rx="3" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text font-size="10" x="292" y="162" text-anchor="middle" fill="#4a1b0c">epi</text>
<!-- gate_contact same z -->
<rect x="320" y="136" width="40" height="56" rx="3" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text font-size="10" x="340" y="159" text-anchor="middle" fill="#26215c">gate</text>
<text font-size="10" x="340" y="174" text-anchor="middle" fill="#534ab7">22→59</text>
<!-- high water same 59 (parallel didn't raise it) -->
<line x1="272" y1="136" x2="360" y2="136" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="4 2"/>
<text font-size="10" x="268" y="140" text-anchor="end" fill="#c0392b">hw=59</text>
<text font-size="9" x="316" y="128" text-anchor="middle" fill="#888">high_water unchanged</text>

<!-- ── Step 4: after m0 ── accumulated from hw=59, h=44, hw becomes 103 -->
<rect x="400" y="192" width="88" height="36" rx="3" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
<text font-size="11" x="444" y="214" text-anchor="middle" fill="#633806">poly</text>
<rect x="400" y="136" width="40" height="56" rx="3" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<rect x="448" y="136" width="40" height="56" rx="3" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<!-- m0 accumulated -->
<rect x="400" y="92" width="88" height="44" rx="3" fill="#d5f0ea" stroke="#1d9e75" stroke-width="0.5"/>
<text font-size="11" x="444" y="114" text-anchor="middle" fill="#085041">m0  59→103</text>
<!-- high water at 103 -->
<line x1="400" y1="92" x2="488" y2="92" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="4 2"/>
<text font-size="10" x="396" y="96" text-anchor="end" fill="#c0392b">hw=103</text>
<text font-size="9" x="444" y="84" text-anchor="middle" fill="#1d9e75">accumulated from hw=59</text>

<!-- ── Step 5: after v0 ── accumulated from hw=103, h=36, hw=139 -->
<rect x="528" y="192" width="88" height="36" rx="3" fill="#faeeda" stroke="#ba7517" stroke-width="0.5"/>
<text font-size="11" x="572" y="214" text-anchor="middle" fill="#633806">poly</text>
<rect x="528" y="136" width="40" height="56" rx="3" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<rect x="576" y="136" width="40" height="56" rx="3" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<rect x="528" y="92" width="88" height="44" rx="3" fill="#d5f0ea" stroke="#1d9e75" stroke-width="0.5"/>
<text font-size="11" x="572" y="114" text-anchor="middle" fill="#085041">m0</text>
<!-- v0 -->
<rect x="528" y="56" width="88" height="36" rx="3" fill="#e1e1e1" stroke="#5f5e5a" stroke-width="0.5"/>
<text font-size="11" x="572" y="74" text-anchor="middle" fill="#2c2c2a">v0  103→139</text>
<!-- high water at 139 -->
<line x1="528" y1="56" x2="616" y2="56" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="4 2"/>
<text font-size="10" x="524" y="60" text-anchor="end" fill="#c0392b">hw=139</text>

<!-- Bottom labels (high_water value) -->
<text font-size="11" x="60"  y="248" text-anchor="middle" fill="#888">high_water = 22</text>
<text font-size="11" x="188" y="248" text-anchor="middle" fill="#888">high_water = 59</text>
<text font-size="11" x="316" y="248" text-anchor="middle" fill="#888">high_water = 59</text>
<text font-size="11" x="444" y="248" text-anchor="middle" fill="#888">high_water = 103</text>
<text font-size="11" x="572" y="248" text-anchor="middle" fill="#888">high_water = 139</text>

<!-- note at bottom -->
<text font-size="11" x="340" y="278" text-anchor="middle" fill="#c0392b">The parallel group (epi_ct + gate_ct) shares z=22; high_water advances only once to max(z_top) = 59</text>
</svg>
